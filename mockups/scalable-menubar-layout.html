<!doctype html>
<!--
Assumptions:
- This is a visual/interaction mockup only; it does not touch the native Swift app.
- Host names and telemetry values below are mock data, with no IPs, usernames, passwords, or key paths.
- Design goal: keep the menubar panel fixed-height as hosts scale, while preserving rich detail for one selected host.
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Remote Info Scalable Menubar Mockup</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #15161c;
      --panel: #24252d;
      --panel-2: #2b2c35;
      --panel-3: #33343e;
      --line: rgba(255, 255, 255, 0.09);
      --text: #f4f4f7;
      --muted: #a6a7af;
      --faint: #777984;
      --green: #3ee56f;
      --yellow: #f1c84b;
      --orange: #ff9b42;
      --red: #ff5b64;
      --blue: #6ca8ff;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.46);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 24% 12%, rgba(255, 255, 255, 0.07), transparent 26%),
        linear-gradient(135deg, #101116, #20212a 56%, #111218);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      letter-spacing: 0;
    }

    button {
      font: inherit;
    }

    .popover {
      width: min(820px, calc(100vw - 36px));
      height: min(704px, calc(100vh - 36px));
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      background: rgba(38, 39, 48, 0.94);
      box-shadow: var(--shadow);
      backdrop-filter: blur(26px);
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.025);
    }

    .title-stack {
      min-width: 0;
    }

    .title {
      margin: 0;
      font-size: 17px;
      font-weight: 700;
      line-height: 1.25;
    }

    .subtitle {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
    }

    .summary {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: center;
      gap: 7px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 26px;
      padding: 4px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .refresh {
      min-height: 26px;
      padding: 4px 10px;
      border: 1px solid rgba(108, 168, 255, 0.42);
      border-radius: 7px;
      background: rgba(108, 168, 255, 0.12);
      color: #dbe8ff;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .refresh:active {
      transform: translateY(1px);
    }

    .content {
      min-height: 0;
      display: grid;
      grid-template-columns: 270px 1fr;
    }

    .host-list {
      min-height: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--line);
      background: rgba(0, 0, 0, 0.08);
    }

    .list-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 12px 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .scroll {
      min-height: 0;
      overflow-y: auto;
      padding: 0 8px 10px;
    }

    .scroll::-webkit-scrollbar {
      width: 8px;
    }

    .scroll::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.16);
    }

    .host-row {
      position: relative;
      width: 100%;
      display: grid;
      grid-template-columns: 10px 1fr auto;
      gap: 8px;
      align-items: start;
      margin-bottom: 6px;
      padding: 10px 9px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--text);
      text-align: left;
      cursor: pointer;
    }

    .host-row:hover {
      background: rgba(255, 255, 255, 0.045);
    }

    .host-row.selected {
      border-color: rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.08);
    }

    .host-row.selected::before {
      content: "";
      position: absolute;
      top: 8px;
      bottom: 8px;
      left: 0;
      width: 3px;
      border-radius: 999px;
      background: var(--blue);
    }

    .dot {
      width: 8px;
      height: 8px;
      margin-top: 5px;
      border-radius: 999px;
      background: var(--green);
      box-shadow: 0 0 0 3px rgba(62, 229, 111, 0.12);
    }

    .dot.yellow {
      background: var(--yellow);
      box-shadow: 0 0 0 3px rgba(241, 200, 75, 0.12);
    }

    .dot.orange {
      background: var(--orange);
      box-shadow: 0 0 0 3px rgba(255, 155, 66, 0.12);
    }

    .dot.red {
      background: var(--red);
      box-shadow: 0 0 0 3px rgba(255, 91, 100, 0.12);
    }

    .host-title {
      min-width: 0;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.25;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .host-meta {
      margin-top: 2px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .host-metrics {
      grid-column: 2 / 4;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 5px;
      margin-top: 7px;
    }

    .mini {
      min-width: 0;
      display: flex;
      justify-content: space-between;
      gap: 4px;
      padding: 5px 6px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.04);
      font-size: 11px;
      line-height: 1;
    }

    .mini span:first-child {
      color: var(--faint);
      font-weight: 700;
    }

    .mini span:last-child {
      font-variant-numeric: tabular-nums;
      font-weight: 800;
    }

    .badge {
      justify-self: end;
      padding: 3px 6px;
      border-radius: 999px;
      background: rgba(62, 229, 111, 0.1);
      color: var(--green);
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .badge.stale {
      background: rgba(241, 200, 75, 0.1);
      color: var(--yellow);
    }

    .badge.offline {
      background: rgba(255, 91, 100, 0.1);
      color: var(--red);
    }

    .detail {
      min-width: 0;
      min-height: 0;
      overflow-y: auto;
      padding: 14px 16px 16px;
    }

    .detail::-webkit-scrollbar {
      width: 8px;
    }

    .detail::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.16);
    }

    .detail-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .detail h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
    }

    .target {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    .section {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }

    .section-title {
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .metric {
      min-width: 0;
      min-height: 54px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.035);
    }

    .metric-label {
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      line-height: 1;
      text-transform: uppercase;
    }

    .metric-value {
      margin-top: 7px;
      overflow: hidden;
      color: var(--text);
      font-size: 14px;
      font-variant-numeric: tabular-nums;
      font-weight: 800;
      line-height: 1.15;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .value-green {
      color: var(--green);
    }

    .value-yellow {
      color: var(--yellow);
    }

    .value-orange {
      color: var(--orange);
    }

    .value-red {
      color: var(--red);
    }

    .wide {
      grid-column: span 3;
    }

    .activity-grid {
      display: grid;
      grid-template-columns: 1fr 1.25fr 0.8fr;
      gap: 8px;
    }

    .process-list {
      display: grid;
      gap: 5px;
    }

    .process {
      display: grid;
      grid-template-columns: 8px minmax(0, 1fr) 64px 58px;
      gap: 8px;
      align-items: center;
      min-height: 24px;
      padding: 4px 2px;
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }

    .process-name {
      overflow: hidden;
      color: #dedfe5;
      font-weight: 700;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .process small {
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .gpu-card {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.035);
    }

    .gpu-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .gpu-name {
      min-width: 0;
      overflow: hidden;
      font-size: 13px;
      font-weight: 800;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .gpu-driver {
      margin-top: 2px;
      color: var(--muted);
      font-size: 11px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 46px 1fr 112px;
      gap: 8px;
      align-items: center;
      margin-top: 8px;
    }

    .bar-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .bar {
      height: 9px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
    }

    .bar-fill {
      height: 100%;
      border-radius: inherit;
      background: var(--green);
    }

    .bar-fill.yellow {
      background: var(--yellow);
    }

    .bar-value {
      text-align: right;
      color: var(--green);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      font-weight: 800;
      white-space: nowrap;
    }

    .gpu-metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    @media (max-width: 760px) {
      .popover {
        height: calc(100vh - 24px);
      }

      .content {
        grid-template-columns: 1fr;
      }

      .host-list {
        max-height: 250px;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .summary {
        justify-content: flex-start;
      }

      .topbar {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="popover" aria-label="Remote Info menu bar panel mockup">
    <header class="topbar">
      <div class="title-stack">
        <h1 class="title">Remote Info</h1>
        <div class="subtitle">Fleet status · 5 hosts · periodic refresh every 5 minutes</div>
      </div>
      <div class="summary" aria-label="Fleet summary">
        <div class="chip"><span class="dot"></span>Online 4</div>
        <div class="chip"><span class="dot yellow"></span>Stale 1</div>
        <div class="chip"><span class="dot red"></span>Offline 0</div>
        <div class="chip">Last refresh 2m ago</div>
        <button class="refresh" type="button">Refresh</button>
      </div>
    </header>

    <section class="content">
      <aside class="host-list" aria-label="Hosts">
        <div class="list-head">
          <span>Hosts</span>
          <span>Worst first</span>
        </div>
        <div class="scroll" id="hostList"></div>
      </aside>

      <section class="detail" id="detail" aria-label="Selected host detail"></section>
    </section>
  </main>

  <script>
    const hosts = [
      {
        id: "render-5090-a",
        name: "render-5090-a",
        target: "ssh alias · th workstation",
        status: "online",
        severity: "green",
        updated: "Updated just now",
        cpu: "0.26% / 32 cores",
        load: "0.12 / 32 cores",
        mem: "34% / 128 GB",
        disk: "41% / 2 TB",
        ssh: "128 ms",
        traffic: "↓ 17.5 MB/s  ↑ 3.2 MB/s",
        net: "eth0 up",
        ip: "--",
        gpuTemp: "46 C",
        gpu: {
          name: "NVIDIA GeForce RTX 5090 D v2",
          driver: "610.43.02",
          util: 0,
          utilText: "0%",
          vram: 3,
          vramText: "0.8 GB / 23.9 GB",
          power: "22/575 W",
          fan: "0%",
          clock: "0.18 GHz"
        },
        processes: [
          ["python3", "0.32%", "1.9%", "green"],
          ["ollama", "0.18%", "2.4%", "green"],
          ["nvitop", "0.12%", "0.2%", "green"],
          ["v2rayN", "0.05%", "0.3%", "green"],
          ["sshd", "0.03%", "0.1%", "green"]
        ]
      },
      {
        id: "render-5090-b",
        name: "render-5090-b",
        target: "ssh alias · th workstation",
        status: "online",
        severity: "green",
        updated: "Updated 2m ago",
        cpu: "1.84% / 32 cores",
        load: "0.52 / 32 cores",
        mem: "39% / 128 GB",
        disk: "44% / 2 TB",
        ssh: "146 ms",
        traffic: "↓ 4.8 MB/s  ↑ 820 KB/s",
        net: "eth0 up",
        ip: "--",
        gpuTemp: "49 C",
        gpu: {
          name: "NVIDIA GeForce RTX 5090 D v2",
          driver: "610.43.02",
          util: 4,
          utilText: "4%",
          vram: 7,
          vramText: "1.7 GB / 23.9 GB",
          power: "30/575 W",
          fan: "0%",
          clock: "0.21 GHz"
        },
        processes: [
          ["python3", "1.28%", "3.2%", "green"],
          ["node", "0.54%", "0.7%", "green"],
          ["sshd", "0.11%", "0.1%", "green"],
          ["curl", "0.08%", "0.1%", "green"],
          ["systemd", "0.05%", "0.2%", "green"]
        ]
      },
      {
        id: "cloud-a100",
        name: "cloud-a100",
        target: "ssh alias · cloud gpu",
        status: "stale",
        severity: "yellow",
        updated: "Updated 11m ago",
        cpu: "62% / 64 cores",
        load: "31.8 / 64 cores",
        mem: "71% / 256 GB",
        disk: "68% / 4 TB",
        ssh: "412 ms",
        traffic: "↓ 46.1 MB/s  ↑ 12.4 MB/s",
        net: "ens5 up",
        ip: "JP Tokyo",
        gpuTemp: "78 C",
        gpu: {
          name: "NVIDIA A100 PCIe",
          driver: "575.64",
          util: 91,
          utilText: "91%",
          vram: 72,
          vramText: "57.6 GB / 80.0 GB",
          power: "238/300 W",
          fan: "74%",
          clock: "1.41 GHz"
        },
        processes: [
          ["trainer", "382%", "41.0%", "orange"],
          ["python3", "142%", "12.6%", "orange"],
          ["wandb", "8.4%", "0.8%", "green"],
          ["docker", "3.1%", "1.1%", "green"],
          ["sshd", "0.4%", "0.1%", "green"]
        ]
      },
      {
        id: "lab-box",
        name: "lab-box",
        target: "ssh alias · local lab",
        status: "online",
        severity: "orange",
        updated: "Updated 3m ago",
        cpu: "18% / 24 cores",
        load: "9.6 / 24 cores",
        mem: "88% / 96 GB",
        disk: "82% / 1 TB",
        ssh: "88 ms",
        traffic: "↓ 1.2 MB/s  ↑ 2.9 MB/s",
        net: "eno1 up",
        ip: "US Oregon",
        gpuTemp: "83 C",
        gpu: {
          name: "NVIDIA GeForce RTX 4090",
          driver: "575.64",
          util: 66,
          utilText: "66%",
          vram: 84,
          vramText: "20.2 GB / 24.0 GB",
          power: "385/450 W",
          fan: "82%",
          clock: "2.52 GHz"
        },
        processes: [
          ["ffmpeg", "44%", "2.1%", "green"],
          ["python3", "28%", "48.5%", "green"],
          ["java", "8.9%", "12.0%", "green"],
          ["docker", "5.1%", "1.9%", "green"],
          ["sshd", "0.2%", "0.1%", "green"]
        ]
      },
      {
        id: "backup-vps",
        name: "backup-vps",
        target: "ssh alias · utility",
        status: "online",
        severity: "green",
        updated: "Updated 4m ago",
        cpu: "3.72% / 8 cores",
        load: "0.82 / 8 cores",
        mem: "28% / 16 GB",
        disk: "59% / 512 GB",
        ssh: "204 ms",
        traffic: "↓ 640 KB/s  ↑ 1.1 MB/s",
        net: "eth0 up",
        ip: "SG Singapore",
        gpuTemp: "--",
        gpu: null,
        processes: [
          ["postgres", "2.8%", "8.4%", "green"],
          ["backupd", "1.4%", "1.2%", "green"],
          ["nginx", "0.5%", "0.2%", "green"],
          ["sshd", "0.1%", "0.1%", "green"],
          ["systemd", "0.1%", "0.3%", "green"]
        ]
      }
    ];

    let selectedId = hosts[0].id;

    function colorClass(severity) {
      if (severity === "yellow") return "value-yellow";
      if (severity === "orange") return "value-orange";
      if (severity === "red") return "value-red";
      return "value-green";
    }

    function dotClass(severity) {
      if (severity === "yellow") return "dot yellow";
      if (severity === "orange") return "dot orange";
      if (severity === "red") return "dot red";
      return "dot";
    }

    function statusBadge(host) {
      if (host.status === "stale") return '<span class="badge stale">Stale</span>';
      if (host.status === "offline") return '<span class="badge offline">Offline</span>';
      return '<span class="badge">Online</span>';
    }

    function renderHostList() {
      const list = document.getElementById("hostList");
      list.innerHTML = hosts.map((host) => {
        const selected = host.id === selectedId ? " selected" : "";
        const warning = host.severity === "yellow" || host.severity === "orange" ? " warning" : "";
        const offline = host.status === "offline" ? " offline" : "";
        return `
          <button class="host-row${selected}${warning}${offline}" type="button" data-host-id="${host.id}">
            <span class="${dotClass(host.severity)}"></span>
            <span>
              <span class="host-title">${host.name}</span>
              <span class="host-meta">${host.updated}</span>
            </span>
            ${statusBadge(host)}
            <span class="host-metrics">
              <span class="mini"><span>CPU</span><span class="${colorClass(host.severity)}">${host.cpu.split(" / ")[0]}</span></span>
              <span class="mini"><span>MEM</span><span>${host.mem.split(" / ")[0]}</span></span>
              <span class="mini"><span>GPU</span><span class="${colorClass(host.severity)}">${host.gpuTemp}</span></span>
            </span>
          </button>
        `;
      }).join("");

      list.querySelectorAll(".host-row").forEach((button) => {
        button.addEventListener("click", () => {
          selectedId = button.dataset.hostId;
          render();
        });
      });
    }

    function metric(label, value, severity = "") {
      const valueClass = severity ? colorClass(severity) : "";
      const dot = severity ? `<span class="${dotClass(severity)}"></span>` : "";
      return `
        <div class="metric">
          <div class="metric-label">${dot}${label}</div>
          <div class="metric-value ${valueClass}">${value}</div>
        </div>
      `;
    }

    function renderProcesses(host) {
      return host.processes.map((process) => `
        <div class="process">
          <span class="${dotClass(process[3])}"></span>
          <span class="process-name">${process[0]}</span>
          <span><small>CPU</small> ${process[1]}</span>
          <span><small>MEM</small> ${process[2]}</span>
        </div>
      `).join("");
    }

    function renderGpu(host) {
      if (!host.gpu) {
        return `
          <section class="section">
            <div class="section-title">GPU</div>
            <div class="metric wide">
              <div class="metric-label">NVIDIA</div>
              <div class="metric-value">No GPU telemetry</div>
            </div>
          </section>
        `;
      }

      return `
        <section class="section">
          <div class="section-title">GPU</div>
          <div class="gpu-card">
            <div class="gpu-head">
              <div>
                <div class="gpu-name">${host.gpu.name}</div>
                <div class="gpu-driver">Driver ${host.gpu.driver}</div>
              </div>
              <div class="metric-value ${colorClass(host.severity)}">${host.gpuTemp}</div>
            </div>

            <div class="bar-row">
              <div class="bar-label">UTIL</div>
              <div class="bar"><div class="bar-fill" style="width: ${host.gpu.util}%"></div></div>
              <div class="bar-value">${host.gpu.utilText}</div>
            </div>

            <div class="bar-row">
              <div class="bar-label">VRAM</div>
              <div class="bar"><div class="bar-fill ${host.severity === "yellow" ? "yellow" : ""}" style="width: ${host.gpu.vram}%"></div></div>
              <div class="bar-value">${host.gpu.vramText}</div>
            </div>

            <div class="gpu-metrics">
              ${metric("POWER", host.gpu.power, host.severity)}
              ${metric("FAN", host.gpu.fan, host.severity)}
              ${metric("CLOCK", host.gpu.clock)}
            </div>
          </div>
        </section>
      `;
    }

    function renderDetail() {
      const host = hosts.find((candidate) => candidate.id === selectedId);
      const detail = document.getElementById("detail");
      detail.innerHTML = `
        <div class="detail-head">
          <div>
            <h2>${host.name}</h2>
            <div class="target">${host.target}</div>
          </div>
          ${statusBadge(host)}
        </div>

        <div class="metric-grid">
          ${metric("CPU", host.cpu, host.severity === "orange" ? "orange" : "green")}
          ${metric("LOAD", host.load, host.severity === "orange" ? "orange" : "green")}
          ${metric("MEM", host.mem, host.severity === "orange" ? "orange" : "green")}
          ${metric("DISK", host.disk, host.severity === "orange" ? "orange" : "green")}
          ${metric("UPTIME", "18d 4h")}
          ${metric("SSH", host.ssh, host.status === "stale" ? "yellow" : "green")}
          ${metric("KERNEL", "6.8.0-test")}
        </div>

        <section class="section">
          <div class="section-title">Activity</div>
          <div class="activity-grid">
            ${metric("NET", host.net, "green")}
            ${metric("TRAFFIC", host.traffic)}
            ${metric("IP", host.ip)}
          </div>
        </section>

        <section class="section">
          <div class="section-title">Top CPU</div>
          <div class="process-list">
            ${renderProcesses(host)}
          </div>
        </section>

        ${renderGpu(host)}
      `;
    }

    function render() {
      renderHostList();
      renderDetail();
    }

    render();
  </script>
</body>
</html>
